name: Weekly Training Pipeline

on:
  schedule:
    - cron: '0 0 * * 0'   # Every Sunday at 00:00 UTC
  workflow_dispatch:        # Manual trigger

jobs:
  training:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clone Web3Bugs contracts
        run: |
          git clone --depth 1 https://github.com/ZhangZhuoSJTU/Web3Bugs /tmp/Web3Bugs

      - name: Run training pipeline
        id: training
        run: |
          cd training
          export VP_CONTRACT_DIR=/tmp/Web3Bugs/contracts
          python3 train_pipeline.py --full 2>&1 | tee /tmp/training_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Extract JSON summary
        id: summary
        run: |
          python3 -c "
          import json, re
          with open('/tmp/training_output.txt') as f:
              text = f.read()
          m = re.search(r'--- JSON SUMMARY ---\n(.*?)$', text, re.DOTALL)
          if m:
              data = json.loads(m.group(1))
              with open('/tmp/summary.json', 'w') as fh:
                  json.dump(data, fh, indent=2)
              with open('/tmp/extract_flag.txt', 'w') as fh:
                  fh.write('true')
          else:
              with open('/tmp/extract_flag.txt', 'w') as fh:
                  fh.write('false')
          "
          echo "summary_extracted=$(cat /tmp/extract_flag.txt)" >> $GITHUB_OUTPUT

      - name: Build discussion body
        id: body
        if: steps.summary.outputs.summary_extracted == 'true'
        run: |
          python3 .github/scripts/build_discussion_body.py
          echo "body_built=true" >> $GITHUB_OUTPUT

      - name: Post to GitHub Discussions
        if: steps.summary.outputs.summary_extracted == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          TITLE="Weekly Training Report — $(date +%Y-%m-%d)"
          BODY=$(cat /tmp/discussion_body.md | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")

          REPO_ID=$(gh api graphql -f query='query($owner:String!,$name:String!){repository(owner:$owner,name:$name){id}}' \
            -f owner="${{ github.repository_owner }}" \
            -f name="VEILPIERCER" \
            --jq '.data.repository.id')

          CAT_ID=$(gh api graphql -f query='query($owner:String!,$name:String!){repository(owner:$owner,name:$name){discussionCategories(first:1){nodes{id name}}}}' \
            -f owner="${{ github.repository_owner }}" \
            -f name="VEILPIERCER" \
            --jq '.data.repository.discussionCategories.nodes[0].id')

          gh api graphql -f query='
            mutation($repoId: ID!, $title: String!, $body: String!, $categoryId: ID!) {
              createDiscussion(input: {
                repositoryId: $repoId,
                title: $title,
                body: $body,
                categoryId: $categoryId
              }) {
                discussion { url }
              }
            }
          ' -f repoId="$REPO_ID" \
            -f title="$TITLE" \
            -f body="$BODY" \
            -f categoryId="$CAT_ID"

      - name: Fallback — post as issue
        if: steps.summary.outputs.summary_extracted != 'true' || failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tail -80 /tmp/training_output.txt > /tmp/fallback_body.txt
          gh issue create \
            --title "Weekly Training Report — $(date +%Y-%m-%d)" \
            --body-file /tmp/fallback_body.txt \
            --label "training"
