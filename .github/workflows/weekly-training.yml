name: Weekly Training Pipeline

on:
  schedule:
    - cron: '0 0 * * 0'   # Every Sunday at 00:00 UTC
  workflow_dispatch:        # Manual trigger

jobs:
  training:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clone Web3Bugs contracts
        run: |
          git clone --depth 1 https://github.com/ZhangZhuoSJTU/Web3Bugs /tmp/Web3Bugs

      - name: Run training pipeline
        id: training
        run: |
          cd training
          export VP_CONTRACT_DIR=/tmp/Web3Bugs/contracts
          python3 train_pipeline.py --full 2>&1 | tee /tmp/training_output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Extract JSON summary
        id: summary
        run: |
          python3 -c "
          import json, re
          with open('/tmp/training_output.txt') as f:
              text = f.read()
          # Extract JSON block after '--- JSON SUMMARY ---'
          m = re.search(r'--- JSON SUMMARY ---\n(.*?)$', text, re.DOTALL)
          if m:
              data = json.loads(m.group(1))
              # Write clean JSON for the discussion body
              with open('/tmp/summary.json', 'w') as f:
                  json.dump(data, f, indent=2)
              print('summary_extracted=true')
          else:
              print('summary_extracted=false')
          " >> $GITHUB_OUTPUT

      - name: Build discussion body
        id: body
        run: |
          python3 -c "
          import json, os
          from datetime import datetime

          with open('/tmp/summary.json') as f:
              s = json.load(f)

          status = '✅ ALL GATES PASSED' if s['ci_gates_passed'] else '❌ GATES FAILED'
          sev = s['findings_by_severity']
          suggestions = '\n'.join([f'- [{x[\"priority\"].upper()}] **{x[\"area\"]}**: {x[\"suggestion\"]}' for x in s.get('top_suggestions', [])]) or '_None_'

          body = f'''## Weekly Training Report — {datetime.utcnow().strftime(\"%Y-%m-%d\")}

          ### {status}

          | Metric | Value |
          |--------|-------|
          | Contracts scanned | {s['contracts_scanned']} |
          | Contests | {s['contests']} |
          | Total imports | {s['total_imports']} |
          | Dep resolution | {s['dep_resolution_pct']}% (npm {s['npm_resolution_pct']}% · rel {s['rel_resolution_pct']}%) |
          | Total findings | {s['total_findings']} |
          | Critical | {sev.get('critical', 0)} |
          | High | {sev.get('high', 0)} |
          | Medium | {sev.get('medium', 0)} |
          | Low | {sev.get('low', 0)} |
          | Informational | {sev.get('informational', 0)} |
          | Privacy violations | {s['privacy_violations']} |
          | Avg scan time | {s['avg_scan_time_s']}s |
          | Total time | {s['total_time_s']}s |
          | Regression drifts | {s['regression_drifts']} |
          | Improvement suggestions | {s['improvement_suggestions']} |

          ### Top Improvement Suggestions
          {suggestions}

          ---
          *Auto-generated by VeilPiercer Training Pipeline · `train_pipeline.py --full`*
          '''

          with open('/tmp/discussion_body.md', 'w') as f:
              f.write(body)
          print('body_built=true')
          " >> $GITHUB_OUTPUT

      - name: Post to GitHub Discussions
        if: steps.summary.outputs.summary_extracted == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create a discussion via GitHub API
          REPO="${{ github.repository }}"
          TITLE="Weekly Training Report — $(date +%Y-%m-%d)"
          BODY=$(cat /tmp/discussion_body.md | python3 -c "import sys,json; print(json.dumps(sys.stdin.read()))")

          gh api graphql -f query='
            mutation($repoId: ID!, $title: String!, $body: String!, $categoryId: ID!) {
              createDiscussion(input: {
                repositoryId: $repoId,
                title: $title,
                body: $body,
                categoryId: $categoryId
              }) {
                discussion {
                  url
                }
              }
            }
          ' -f repoId="$(gh api graphql -f query='query($owner:String!,$name:String!){repository(owner:$owner,name:$name){id}}' -f owner="${{ github.repository_owner }}" -f name="VEILPIERCER" --jq '.data.repository.id')" \
            -f title="$TITLE" \
            -f body="$BODY" \
            -f categoryId="$(gh api graphql -f query='query($owner:String!,$name:String!){repository(owner:$owner,name:$name){discussionCategories(first:1){nodes{id name}}}}' -f owner="${{ github.repository_owner }}" -f name="VEILPIERCER" --jq '.data.repository.discussionCategories.nodes[0].id')"

      - name: Fallback — post as issue
        if: steps.summary.outputs.summary_extracted != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Weekly Training Report — $(date +%Y-%m-%d)" \
            --body "$(cat /tmp/training_output.txt | tail -80)" \
            --label "training"
